<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0D1A"/>
      <stop offset="100%" stop-color="#05060B"/>
    </linearGradient>
    <filter id="termGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="900" height="380" rx="14" fill="url(#termBg)" stroke="#22D3EE" stroke-opacity="0.25"/>
  <rect x="4" y="4" width="892" height="372" rx="12" fill="none" stroke="#7C3AED" stroke-opacity="0.15"/>

  <!-- title bar -->
  <rect width="900" height="38" rx="14" fill="#0F1225"/>
  <rect y="24" width="900" height="14" fill="#0F1225"/>
  <circle cx="24" cy="19" r="6" fill="#FF5F56"/>
  <circle cx="46" cy="19" r="6" fill="#FFBD2E"/>
  <circle cx="68" cy="19" r="6" fill="#27C93F"/>
  <text x="450" y="24" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" fill="#8AA0C2">momina@ai-engine: ~</text>

  <g font-family="'JetBrains Mono',monospace" font-size="16">

    <!-- command 1 -->
    <text x="24" y="72" fill="#22D3EE" opacity="0"><tspan fill="#A855F7">$ </tspan>whoami
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.01;1" dur="0.01s" begin="0.2s" fill="freeze"/>
    </text>
    <text x="24" y="98" fill="#E9F8FF" opacity="0">&#8594; Momina Azam &#183; NTU, Faisalabad &#183; CV / Applied ML / Full-Stack
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1s" fill="freeze"/>
    </text>

    <!-- command 2 -->
    <text x="24" y="140" fill="#22D3EE" opacity="0"><tspan fill="#A855F7">$ </tspan>cat tech-stack.txt
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.4s" fill="freeze"/>
    </text>
    <text x="24" y="166" fill="#E9F8FF" opacity="0">&#8594; Python &#183; FastAPI &#183; PyTorch &#183; TensorFlow &#183; Scikit-Learn
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.2s" fill="freeze"/>
    </text>
    <text x="24" y="190" fill="#E9F8FF" opacity="0">&#8594; OpenCV &#183; Transformers &#183; LangChain &#183; Next.js &#183; React &#183; TypeScript
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.7s" fill="freeze"/>
    </text>
    <text x="24" y="214" fill="#E9F8FF" opacity="0">&#8594; PostgreSQL &#183; Docker &#183; GitHub Actions &#183; AWS &#183; Azure
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="4.2s" fill="freeze"/>
    </text>

    <!-- command 3 -->
    <text x="24" y="256" fill="#22D3EE" opacity="0"><tspan fill="#A855F7">$ </tspan>cat current-focus.txt
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="5.4s" fill="freeze"/>
    </text>
    <text x="24" y="282" fill="#E9F8FF" opacity="0">&#8594; Computer Vision &#183; Applied ML &#183; Automation Tooling
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="6.2s" fill="freeze"/>
    </text>
    <text x="24" y="306" fill="#E9F8FF" opacity="0">&#8594; Ship the smallest version that tells the truth
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="6.7s" fill="freeze"/>
    </text>

    <!-- command 4 -->
    <text x="24" y="348" fill="#22D3EE" opacity="0"><tspan fill="#A855F7">$ </tspan>echo &#8220;always learning&#8221;
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="7.8s" fill="freeze"/>
    </text>
    <rect x="270" y="337" width="9" height="16" fill="#22D3EE" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="7.8s" fill="freeze"/>
    </rect>
  </g>

  <!-- blinking cursor -->
  <rect x="24" y="340" width="9" height="16" fill="#22D3EE">
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="8.2s" repeatCount="indefinite"/>
  </rect>
</svg>
