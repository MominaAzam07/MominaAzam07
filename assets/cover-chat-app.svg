<svg width="640" height="300" viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#05060B"/><stop offset="100%" stop-color="#0A0E27"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
</radialGradient>
<filter id="blur"><feGaussianBlur stdDeviation="26"/></filter>
<linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#A855F7"/>
</linearGradient>
</defs>
<rect width="640" height="300" rx="18" fill="url(#bg)"/>
<circle cx="500" cy="90" r="140" fill="url(#glow)" filter="url(#blur)">
<animate attributeName="r" values="120;150;120" dur="6s" repeatCount="indefinite"/>
</circle>
<g stroke="#22D3EE" stroke-width="1" opacity="0.18" fill="none">
<path d="M0,40 H160 L195,75 H420"/><path d="M640,260 H480 L445,225 H220"/>
</g>

<g transform="translate(60,50)">
<rect x="0" y="0" width="120" height="70" rx="18" fill="none" stroke="#A855F7" stroke-width="2.5" opacity="0.9"/>
<path d="M18,70 L18,90 L42,70 Z" fill="none" stroke="#A855F7" stroke-width="2.5" opacity="0.9"/>
<rect x="55" y="35" width="120" height="70" rx="18" fill="none" stroke="#22D3EE" stroke-width="2.5" opacity="0.95"/>
<path d="M157,105 L157,125 L133,105 Z" fill="none" stroke="#22D3EE" stroke-width="2.5" opacity="0.95"/>
<g fill="#22D3EE">
<circle cx="90" cy="70" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0s" repeatCount="indefinite"/></circle>
<circle cx="105" cy="70" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.2s" repeatCount="indefinite"/></circle>
<circle cx="120" cy="70" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.4s" repeatCount="indefinite"/></circle>
</g>
</g>
<text x="48" y="215" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="30" font-weight="700" fill="url(#txt)">Real-Time Chat Application</text>
<text x="50" y="245" font-family="'JetBrains Mono',monospace" font-size="14" fill="#8AA0C2">WebSocket messaging &#183; real-time UI</text>
<rect x="48" y="258" width="0" height="2.5" fill="url(#txt)"><animate attributeName="width" values="0;180" dur="1.4s" fill="freeze"/></rect>
</svg>