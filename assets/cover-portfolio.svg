<svg width="640" height="300" viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#05060B"/><stop offset="100%" stop-color="#0A0E27"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
</radialGradient>
<filter id="blur"><feGaussianBlur stdDeviation="26"/></filter>
<linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#5EEAD4"/><stop offset="100%" stop-color="#22D3EE"/>
</linearGradient>
</defs>
<rect width="640" height="300" rx="18" fill="url(#bg)"/>
<circle cx="500" cy="90" r="140" fill="url(#glow)" filter="url(#blur)">
<animate attributeName="r" values="120;150;120" dur="6s" repeatCount="indefinite"/>
</circle>
<g stroke="#5EEAD4" stroke-width="1" opacity="0.18" fill="none">
<path d="M0,40 H160 L195,75 H420"/><path d="M640,260 H480 L445,225 H220"/>
</g>

<g transform="translate(60,45)">
<rect x="0" y="0" width="180" height="115" rx="10" fill="none" stroke="#22D3EE" stroke-width="2.5"/>
<line x1="0" y1="26" x2="180" y2="26" stroke="#22D3EE" stroke-width="2" opacity="0.6"/>
<circle cx="14" cy="13" r="3.5" fill="#A855F7"/><circle cx="26" cy="13" r="3.5" fill="#22D3EE" opacity="0.7"/><circle cx="38" cy="13" r="3.5" fill="#5EEAD4" opacity="0.7"/>
<rect x="14" y="40" width="70" height="10" rx="2" fill="#A855F7" opacity="0.8"><animate attributeName="width" values="0;70" dur="1s" fill="freeze"/></rect>
<rect x="14" y="58" width="152" height="6" rx="2" fill="#22D3EE" opacity="0.4"/>
<rect x="14" y="70" width="130" height="6" rx="2" fill="#22D3EE" opacity="0.4"/>
<rect x="14" y="90" width="46" height="16" rx="4" fill="none" stroke="#5EEAD4" stroke-width="2"/>
</g>
<text x="48" y="215" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="30" font-weight="700" fill="url(#txt)">Portfolio</text>
<text x="50" y="245" font-family="'JetBrains Mono',monospace" font-size="14" fill="#8AA0C2">The companion site to this profile</text>
<rect x="48" y="258" width="0" height="2.5" fill="url(#txt)"><animate attributeName="width" values="0;180" dur="1.4s" fill="freeze"/></rect>
</svg>